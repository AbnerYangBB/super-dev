name: verification

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sync-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dry-run sync
        run: python3 scripts/sync_skills.py --workspace-root "$RUNNER_TEMP/workspace" --dry-run

      - name: Real sync
        run: python3 scripts/sync_skills.py --workspace-root "$RUNNER_TEMP/workspace"

      - name: Verify target root contains synced skills
        run: |
          test -d "$RUNNER_TEMP/workspace/.agents/skills/super-dev"
          python3 - <<'PY'
          import os
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"]) / "workspace" / ".agents" / "skills" / "super-dev"
          has_skill = any(path.name == "SKILL.md" for path in root.rglob("*"))
          if not has_skill:
              raise SystemExit("No synced SKILL.md files found")
          PY
